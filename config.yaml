server:
  port: 9000

browser:
  # 指纹浏览器（fingerprint-chromium）可执行文件路径
  # 留空则使用默认值：macOS /Applications/Chromium.app/Contents/MacOS/Chromium
  # Linux 示例：/usr/bin/chromium 或 /opt/fingerprint-chromium/chrome
  chromium_bin: '/usr/bin/chromium'

  # 是否启用无头模式（headless）
  # 默认 false。优先推荐 Linux + Xvfb，这样仍然是“有界面浏览器”，兼容性更稳。
  # headless 只建议用于检测不严格、页面行为简单的平台。
  # 对 Claude 这类检测更严格的平台，不推荐优先开启；可能出现扩展失效、登录态异常或更高风控风险。
  headless: false

  # CDP 端口池：每个浏览器进程占用一个端口
  # cdp_port_start: 起始端口（默认 9223）
  # cdp_port_count: 端口数量，即最多可并发的浏览器数（默认 20）
  cdp_port_start: 9223
  cdp_port_count: 20

scheduler:
  # 单个 type tab 同时允许的最大请求数。
  # 达到上限后，新请求会优先分流到其他已打开浏览器，必要时再拉起新浏览器。
  tab_max_concurrent: 5

  # 浏览器空闲回收扫描周期（秒）
  browser_gc_interval_seconds: 300

  # 一个浏览器下所有 tab 在这段时间内都没有请求时，视为可回收（秒）
  tab_idle_seconds: 900

  # 最少保留多少个浏览器进程不参与回收
  resident_browser_count: 1

# 通常情况无需配置，用于调试时指向 mock 服务
claude:
  # Claude Web2API 入口地址，用于浏览器打开站点（可指向 mock 服务）
  # 生产环境使用默认值；调试时可指向 mock 服务，例如：
  #   start_url: "http://127.0.0.1:8002/mock"
  start_url: ''

  # Claude API 基础地址，用于调用 /api/... 接口（可指向 mock 服务）
  # 生产环境使用默认值；调试时可指向 mock 服务，例如：
  #   api_base: "http://127.0.0.1:8002/mock"
  api_base: ''

mock:
  port: 8002
